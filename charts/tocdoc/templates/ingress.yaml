{{- /* Optional Ingress per enabled service (toggle via <service>.ingress.enabled). */ -}}
{{- $root := . -}}
{{- $fullname := include "tocdoc.fullname" . -}}
{{- range $svcName, $svc := .Values.services }}
{{- if and $svc.enabled $svc.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-{{ $svcName }}
  labels:
    {{- include "tocdoc.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $svcName }}
  {{- with $svc.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $svc.ingress.className }}
  ingressClassName: {{ $svc.ingress.className }}
  {{- end }}
  {{- with $svc.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ $svc.ingress.host | quote }}
      http:
        paths:
          - path: {{ $svc.ingress.path }}
            pathType: {{ $svc.ingress.pathType }}
            backend:
              service:
                name: {{ $fullname }}-{{ $svcName }}
                port:
                  number: {{ $svc.service.port }}
{{- end }}
{{- end }}
