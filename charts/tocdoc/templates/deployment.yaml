{{- /*
Deployment for each enabled service (ingestion, qna).
Env vars are built from global.config + per-service config (plain) and the
referenced Secret (secret keys listed in <service>.secretEnv). Probes hit /health.
*/ -}}
{{- $root := . -}}
{{- $fullname := include "tocdoc.fullname" . -}}
{{- $secretName := include "tocdoc.secretName" . -}}
{{- range $svcName, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-{{ $svcName }}
  labels:
    {{- include "tocdoc.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $svcName }}
spec:
  {{- if not $svc.autoscaling.enabled }}
  replicas: {{ $svc.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tocdoc.name" $root }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: {{ $svcName }}
  template:
    metadata:
      labels:
        {{- include "tocdoc.labels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $svcName }}
      {{- /*
      Pod annotations: optional Prometheus scrape annotations (for clusters
      without the Prometheus Operator / ServiceMonitor CRD) merged with any
      user-supplied podAnnotations. User values win on key conflicts.
      */}}
      {{- $annotations := dict }}
      {{- if $root.Values.metrics.podAnnotations.enabled }}
      {{- $annotations = merge $annotations (dict "prometheus.io/scrape" "true" "prometheus.io/path" $root.Values.metrics.path "prometheus.io/port" (toString $svc.containerPort)) }}
      {{- end }}
      {{- with $svc.podAnnotations }}
      {{- $annotations = merge (deepCopy .) $annotations }}
      {{- end }}
      {{- with $annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $svcName }}
          image: "{{ if $root.Values.global.imageRegistry }}{{ $root.Values.global.imageRegistry }}/{{ end }}{{ $svc.image.repository }}:{{ $svc.image.tag | default $root.Chart.AppVersion }}"
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
              protocol: TCP
          env:
            {{- /* Plain env vars: shared global.config then per-service config. */ -}}
            {{- range $k, $v := $root.Values.global.config }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range $k, $v := $svc.config }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- /* Secret env vars: keys resolved from the referenced Secret. */ -}}
            {{- range $key := $svc.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $key }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ $svc.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ $svc.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ $svc.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ $svc.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ $svc.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ $svc.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ $svc.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ $svc.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ $svc.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ $svc.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          volumeMounts:
            # Writable /tmp backed by an emptyDir so the root filesystem can stay
            # read-only. SDKs (Document Intelligence, openai, etc.) may write
            # temp files here; the app itself persists nothing to local disk.
            - name: tmp
              mountPath: /tmp
            {{- if $root.Values.keyVaultCSI.enabled }}
            # Mounting the CSI volume is what triggers the SecretProviderClass to
            # sync Key Vault objects into the synced Secret referenced by env vars.
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if $root.Values.keyVaultCSI.enabled }}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ $fullname }}-kv
        {{- end }}
      {{- with $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /*
      Affinity precedence: an explicit $svc.affinity always wins. Otherwise, if
      podAntiAffinity.enabled, generate a soft (preferred) anti-affinity that
      spreads replicas of THIS service across nodes. Either way the `affinity`
      key is emitted at most once (a duplicate key would break YAML parsing).
      */}}
      {{- if $svc.affinity }}
      affinity:
        {{- toYaml $svc.affinity | nindent 8 }}
      {{- else if $root.Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: {{ $root.Values.podAntiAffinity.topologyKey | quote }}
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ include "tocdoc.name" $root }}
                    app.kubernetes.io/instance: {{ $root.Release.Name }}
                    app.kubernetes.io/component: {{ $svcName }}
      {{- end }}
      {{- /* topologySpreadConstraints: separate field, no conflict with affinity. */}}
      {{- if $svc.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml $svc.topologySpreadConstraints | nindent 8 }}
      {{- else if $root.Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $root.Values.topologySpread.maxSkew }}
          topologyKey: {{ $root.Values.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ $root.Values.topologySpread.whenUnsatisfiable | quote }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "tocdoc.name" $root }}
              app.kubernetes.io/instance: {{ $root.Release.Name }}
              app.kubernetes.io/component: {{ $svcName }}
      {{- end }}
{{- end }}
{{- end }}
