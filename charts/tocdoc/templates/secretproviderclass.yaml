{{- /*
Azure Key Vault provider for the Secrets Store CSI driver.

Rendered when keyVaultCSI.enabled=true. Syncs the named Key Vault objects into a
Kubernetes Secret (keyVaultCSI.syncedSecretName) whose keys are the canonical
UPPER_SNAKE env-var names. Point secret.externalSecretName at that synced Secret
(and keep secret.create=false) so the Deployments source env vars from it.

Requires the Secrets Store CSI driver + azure provider installed on the cluster:
  https://learn.microsoft.com/azure/aks/csi-secrets-store-driver

The SecretProviderClass alone does not create the synced Secret until a pod
mounts the CSI volume. When keyVaultCSI.enabled=true, deployment.yaml mounts that
volume on each Deployment automatically, which triggers the sync.
*/ -}}
{{- if .Values.keyVaultCSI.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "tocdoc.fullname" . }}-kv
  labels:
    {{- include "tocdoc.labels" . | nindent 4 }}
spec:
  provider: azure
  secretObjects:
    - secretName: {{ .Values.keyVaultCSI.syncedSecretName | quote }}
      type: Opaque
      data:
        {{- range $obj := .Values.keyVaultCSI.objects }}
        - objectName: {{ $obj.objectName | quote }}
          key: {{ $obj.secretKey | quote }}
        {{- end }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    {{- if .Values.keyVaultCSI.userAssignedIdentityID }}
    userAssignedIdentityID: {{ .Values.keyVaultCSI.userAssignedIdentityID | quote }}
    {{- end }}
    keyvaultName: {{ .Values.keyVaultCSI.keyvaultName | quote }}
    tenantId: {{ .Values.keyVaultCSI.tenantId | quote }}
    objects: |
      array:
        {{- range $obj := .Values.keyVaultCSI.objects }}
        - |
          objectName: {{ $obj.objectName }}
          objectType: secret
        {{- end }}
{{- end }}
