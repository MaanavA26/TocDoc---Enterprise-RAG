{{- /*
Placeholder Secret. Rendered ONLY when secret.create=true.

WARNING: This is for non-production bootstrap/testing only. Supply values via
`--set secret.data.AZURE_OPENAI_KEY=...` or a values file kept OUT of version
control. Never commit real secret material to this chart.

In production, set secret.create=false and reference a Secret synced from Azure
Key Vault by the Secrets Store CSI driver (see secretproviderclass.yaml and the
keyVaultCSI.* values), or by an External Secrets Operator ExternalSecret.

Keys are the canonical UPPER_SNAKE env-var names consumed by the services.
*/ -}}
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tocdoc.fullname" . }}
  labels:
    {{- include "tocdoc.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
