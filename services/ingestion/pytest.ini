# pytest.ini for the ingestion service.
# Mirrors services/qna/pytest.ini so behavior is consistent across services.

[pytest]
# --- Discovery ---
testpaths = test
python_files = test*.py

# --- AsyncIO (pytest-asyncio) ---
# Lets pytest handle both normal and async tests without extra decorators.
asyncio_mode = auto

# --- CLI defaults ---
# -q: quiet summary; -ra: show reasons for skipped/xfail
addopts = -q -ra

# --- Logging in test output ---
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s - %(levelname)s - %(name)s - %(message)s
log_date_format = %H:%M:%S

# --- Ignore noisy dirs during discovery ---
norecursedirs = .git venv .venv __pycache__ .pytest_cache

# --- Warnings control (keep CI clean) ---
filterwarnings =
    ignore:.*distutils.*:DeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning

# --- Markers ---
markers =
    admin: tests for admin API endpoints
    ingestion: tests for the document ingestion pipeline
