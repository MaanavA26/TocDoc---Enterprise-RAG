# pytest.ini
[pytest]
# --- Discovery ---
testpaths = test
python_files = test*.py

# --- AsyncIO (pytest-asyncio) ---
# Lets pytest handle both normal and async tests without extra decorators.
asyncio_mode = auto

# --- CLI defaults ---
# -q: quiet summary; -ra: show reasons for skipped/xfail; 
# you can switch to -vv locally if you want full detail.
addopts = -q -ra

# --- Logging in test output ---
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s - %(levelname)s - %(name)s - %(message)s
log_date_format = %H:%M:%S

# --- Ignore noisy dirs during discovery (speed & noise control) ---
norecursedirs = .git venv __pycache__ .pytest_cache

# --- Warnings control (keep CI clean) ---
filterwarnings =
    ignore:.*distutils.*:DeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning

# --- (Optional) Marker registration (prevents "unknown marker" warnings) ---
markers =
    auth: tests related to JWT/auth middleware
    pipeline: tests for QnA pipeline behavior
    services: tests for embedding/search/openai/text services
