name: ci

# Production-grade CI gates for TocDoc.
#
# Job graph:
#   lint       → ruff lint + format (production ruleset)
#   security   → bandit (Python AST scan) + pip-audit (CVE check on installed deps)
#   bicep      → az bicep build (validate IaC compiles)
#   shell      → shellcheck (validate any scripts/*.sh in the repo)
#   helm       → helm lint --strict + helm template (validate charts/tocdoc renders)
#   test       → matrix over {qna, ingestion}; pytest with coverage, artifact uploaded
#   test (sdk) → install clients/python SDK (light: httpx + pydantic) + pytest
#   test (teams-bot)
#              → install services/teams-bot deps (pulls the editable SDK
#                transitively via requirements.txt) + pytest; fully mocked
#   test (eval)→ install eval/ RAGAS harness (heavy: ragas + datasets + its own
#                standalone dep pin set) + pytest; kept as its own parallel job
#                so the slow install never sits on the {qna, ingestion} path
#
# Coverage is gated with a conservative floor (--cov-fail-under, see the test
# job) intended to PREVENT regressions and be ratcheted upward over time, not
# to red the build at its current baseline. Concurrency cancels superseded
# runs on the same ref.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  RUFF_VERSION: "0.15.7"
  BANDIT_VERSION: "1.7.10"
  PIP_AUDIT_VERSION: "2.7.3"
  PYTEST_COV_VERSION: "5.0.0"

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff (lint + format check)
  # ---------------------------------------------------------------------------
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install "ruff==${{ env.RUFF_VERSION }}"

      # clients/python (SDK) and eval/ (RAGAS harness) are linted with the same
      # repo-root ruff config as the services — both omit a [tool.ruff] section
      # so ruff walks up to the root pyproject. Folded into this one fast job.
      - name: ruff check
        run: ruff check services/qna services/ingestion clients/python eval

      - name: ruff format --check
        run: ruff format --check services/qna services/ingestion clients/python eval

  # ---------------------------------------------------------------------------
  # Security — bandit + pip-audit
  # ---------------------------------------------------------------------------
  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install "bandit==${{ env.BANDIT_VERSION }}" "pip-audit==${{ env.PIP_AUDIT_VERSION }}"

      # bandit static analysis. `-r` recursive; skip the test directories
      # (those are allowed to use `# nosec` patterns like hardcoded test
      # tokens, MD5 in fixtures, etc.). Config in pyproject.toml `[tool.bandit]`.
      - name: bandit (Python AST security scan)
        run: bandit -r services/qna services/ingestion -x '*/test/*'

      # pip-audit resolves the requirements file against the advisory DB
      # (PyPI/OSV), per service so a CVE in one dep set doesn't mask the other.
      #
      # HARD GATE (no continue-on-error). Most of the previously-tracked backlog
      # (starlette, python-multipart, cryptography, ...) was cleared by the
      # recent dependency upgrade — both services now run cryptography 48,
      # langchain 1.3.2, fastapi 0.136.3 / starlette 1.2.0, python-multipart
      # 0.0.29, past the previously-vulnerable ranges.
      #
      # pip-audit has no severity selector; it fails on ANY advisory minus an
      # explicit allowlist (--ignore-vuln <ID>, repeatable). The allowlist below
      # is NOT empty — it carries exactly the two advisories the gate currently
      # surfaces, both in aiohttp 3.13.5, both fixed in aiohttp 3.14.0:
      #   GHSA-jg22-mg44-37j8, GHSA-hg6j-4rv6-33pg
      # These are FIXABLE (bump aiohttp to 3.14.0), but that bump lives in the
      # service requirements.txt files, which are OUT OF SCOPE for this
      # ci.yml-only hardening PR. Tracked as a follow-up; the allowlist is the
      # documented bridge so the gate goes green now without swallowing
      # everything. Remove these two entries the moment aiohttp is bumped.
      #
      # Any OTHER advisory — including a new one in aiohttp — still fails the
      # job (the PR's own security check reds; it cannot red main, since a PR
      # must pass this job to merge). New criticals are NOT silently swallowed.
      - name: pip-audit (QnA dependencies)
        run: >-
          pip-audit --requirement services/qna/requirements.txt
          --ignore-vuln GHSA-jg22-mg44-37j8
          --ignore-vuln GHSA-hg6j-4rv6-33pg

      - name: pip-audit (ingestion dependencies)
        # libgl1 / libglib2.0-0 not needed here — pip-audit only inspects the
        # requirements file, doesn't import the packages.
        # Same allowlist as the QnA step — ingestion also pins aiohttp 3.13.5.
        run: >-
          pip-audit --requirement services/ingestion/requirements.txt
          --ignore-vuln GHSA-jg22-mg44-37j8
          --ignore-vuln GHSA-hg6j-4rv6-33pg

  # ---------------------------------------------------------------------------
  # Bicep — validate IaC template compiles
  # ---------------------------------------------------------------------------
  bicep:
    name: bicep build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # az CLI is preinstalled on ubuntu-latest. Ensure bicep is current
      # (preinstalled bicep can lag); this is fast and avoids cryptic
      # "BCP000" version-mismatch errors during build.
      - name: Upgrade az bicep
        run: az bicep upgrade || az bicep install

      # Verifies the template parses and compiles to ARM JSON. Does NOT
      # deploy. Output goes to /tmp so the workspace stays clean.
      - name: az bicep build
        run: az bicep build --file infra/main.bicep --outfile /tmp/main.json

  # ---------------------------------------------------------------------------
  # Shell — shellcheck on any *.sh in scripts/
  # ---------------------------------------------------------------------------
  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # shellcheck is preinstalled on ubuntu-latest. Use `find -print0` +
      # `xargs -0` so paths with spaces are safe. The check is conditional
      # so this job passes when the scripts/ directory doesn't exist yet
      # (e.g., before PR #14 merges) without a separate "no files" branch.
      - name: ShellCheck (scripts/*.sh)
        run: |
          if [ -d scripts ]; then
            find scripts -type f -name '*.sh' -print0 \
              | xargs -0 --no-run-if-empty shellcheck --severity=warning
          else
            echo "scripts/ directory does not exist; nothing to lint."
          fi

  # ---------------------------------------------------------------------------
  # Helm — lint + template-render the AKS chart
  # ---------------------------------------------------------------------------
  #
  # Standalone linter like `bicep` / `shell` (no `needs:`) — validates the
  # alternative AKS packaging path under charts/tocdoc compiles, without
  # deploying. `--strict` promotes lint warnings to errors; `helm template`
  # then renders every template with the default values to catch errors that
  # only surface at render time (bad `{{ }}` references, invalid YAML output).
  helm:
    name: helm lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: helm lint (--strict)
        run: helm lint --strict charts/tocdoc

      # Render to /dev/null — we only care that templating succeeds, not the
      # manifest output (the workspace stays clean).
      - name: helm template
        run: helm template charts/tocdoc > /dev/null

  # ---------------------------------------------------------------------------
  # Test — pytest with coverage (matrix over services)
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        service: [qna, ingestion]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/${{ matrix.service }}/requirements-dev.txt

      # PyMuPDF + langchain image pipeline drag in libs that need system
      # packages. Only the ingestion leg needs them.
      - name: Install ingestion system deps
        if: matrix.service == 'ingestion'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install service requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/${{ matrix.service }}/requirements.txt
          if [ -f services/${{ matrix.service }}/requirements-dev.txt ]; then
            python -m pip install -r services/${{ matrix.service }}/requirements-dev.txt
          fi
          python -m pip install pytest pytest-asyncio "pytest-cov==${{ env.PYTEST_COV_VERSION }}"

      # Coverage report emitted to coverage.xml (Cobertura format — broadly
      # supported by GitHub annotations and external tools).
      #
      # --cov-fail-under=60 is a conservative regression FLOOR, not a target:
      # it is set below the expected current coverage of both legs so it does
      # not red the build today, and is meant to be ratcheted upward as the
      # suites grow. It applies to both matrix legs (qna, ingestion).
      - name: Run pytest with coverage
        working-directory: services/${{ matrix.service }}
        run: |
          pytest -q -ra \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/coverage.xml
            services/${{ matrix.service }}/htmlcov/
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Test (SDK) — clients/python typed HTTP client
  # ---------------------------------------------------------------------------
  #
  # The SDK deps are light (httpx + pydantic) and its tests mock all HTTP with
  # httpx.MockTransport, so this runs fast on the standard runner with no system
  # packages. Kept out of the {qna, ingestion} matrix because it installs an
  # editable package rather than a service requirements file. Gates on lint like
  # the service tests do.
  test-sdk:
    name: test (sdk)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: clients/python/pyproject.toml

      # The `[dev]` extra adds pytest; the base deps pull httpx + pydantic.
      - name: Install SDK (with dev extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "clients/python[dev]"

      - name: Run pytest
        working-directory: clients/python
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Test (teams-bot) — services/teams-bot Bot Framework adapter
  # ---------------------------------------------------------------------------
  #
  # Its suite is fully mocked (no live Teams/Bot Connector/AAD/QnA — see
  # tests/conftest.py fakes), so it runs on the standard runner with no system
  # packages. Gates on lint like the other test jobs.
  #
  # IMPORTANT: install + pytest both run with `working-directory:
  # services/teams-bot`. requirements.txt pins `-e ../../clients/python`, and
  # pip resolves that relative editable path against the CWD (not the
  # requirements file), so the install MUST run from the service dir for the
  # in-repo SDK to install transitively. requirements-dev.txt does
  # `-r requirements.txt` + pytest + pytest-asyncio, so one install covers all.
  test-teams-bot:
    name: test (teams-bot)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            services/teams-bot/requirements.txt
            services/teams-bot/requirements-dev.txt

      - name: Install teams-bot requirements
        working-directory: services/teams-bot
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: services/teams-bot
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Test (eval) — eval/ RAGAS offline evaluation harness
  # ---------------------------------------------------------------------------
  #
  # SEPARATE job, deliberately NOT in the {qna, ingestion} matrix and NOT a
  # `needs:` of any other job, so its heavy install runs in PARALLEL and never
  # sits on the fast critical path. eval/requirements.txt is a STANDALONE,
  # self-contained pin set (decoupled in #120 — it no longer includes
  # `-r ../services/qna/requirements.txt`): it carries ragas + datasets plus
  # its own copy of the QnA import-time closure on the last langchain 0.3.x
  # stack ragas supports, several minutes to install.
  #
  # Runs on every push AND every PR (the workflow's two triggers): per-PR
  # coverage is preferred and this job blocks nothing, so the extra parallel
  # minutes are cheap insurance against the SDK/eval hole this PR is closing.
  # It is a REAL gate — a failing eval test fails the run (no continue-on-error
  # anywhere in this workflow).
  #
  # eval's standalone closure carries no PyMuPDF/image path, so (like the qna
  # test leg) it needs no libgl/libglib system packages — no apt step here.
  test-eval:
    name: test (eval)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: eval/requirements.txt

      - name: Install eval harness requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r eval/requirements.txt
          python -m pip install pytest pytest-asyncio

      # Run from the repo root so eval/tests/conftest.py is discovered and sets
      # the fake Azure env BEFORE the harness (which validates Azure config at
      # import time) is collected. Mocked end to end — no live Azure or RAGAS LLM
      # call.
      - name: Run pytest
        run: pytest eval -q

  # ---------------------------------------------------------------------------
  # Test (loadtest) — loadtest/ helper unit tests
  # ---------------------------------------------------------------------------
  #
  # The load-test harness lives in loadtest/ as flat modules driven by Locust.
  # This job runs ONLY the pure-helper unit tests under loadtest/tests/ (config
  # parsing + helper functions) — it does NOT run Locust. The actual load run
  # needs a live deployment to target, so it is intentionally out of scope for
  # CI. loadtest/requirements.txt is a standalone pin set that already includes
  # pytest, so no extra test-tool install is needed. loadtest/tests/conftest.py
  # puts the loadtest/ dir on sys.path so the flat modules import without a
  # packaging step. Gates on lint like the other test jobs.
  test-loadtest:
    name: test (loadtest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: loadtest/requirements.txt

      - name: Install loadtest requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r loadtest/requirements.txt

      # Helper unit tests only — Locust is NOT invoked (no deployment to target).
      - name: Run pytest
        run: pytest loadtest/tests -q

  # ---------------------------------------------------------------------------
  # Test (integration) — hermetic end-to-end suite (TestClient + mocked Azure)
  # ---------------------------------------------------------------------------
  #
  # tests/integration/ drives each service's real FastAPI app in-process via
  # TestClient with all Azure dependencies mocked (no live Azure, no network),
  # so it runs hermetically here. Standalone requirements.txt pins the deps.
  test-integration:
    name: test (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: tests/integration/requirements.txt

      # The suite imports the REAL service apps via TestClient, so both service
      # runtime stacks must be installed before the test-harness deps.
      - name: Install integration requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/qna/requirements.txt -r services/ingestion/requirements.txt -r tests/integration/requirements.txt

      - name: Run pytest
        run: pytest tests/integration -q
