name: ci

# Production-grade CI gates for TocDoc.
#
# Job graph:
#   lint       → ruff lint + format (production ruleset)
#   security   → bandit (Python AST scan) + pip-audit (CVE check on installed deps)
#   bicep      → az bicep build (validate IaC compiles)
#   shell      → shellcheck (validate any scripts/*.sh in the repo)
#   test       → matrix over {qna, ingestion}; pytest with coverage, artifact uploaded
#   test (sdk) → install clients/python SDK (light: httpx + pydantic) + pytest
#   test (eval)→ install eval/ RAGAS harness (heavy: ragas + qna deps) + pytest
#                kept as its own parallel job so the slow install never sits on
#                the {qna, ingestion} critical path
#
# Coverage is computed but NOT gated this round. The architect can set a
# threshold in a follow-up PR after the baseline is observable. Concurrency
# cancels superseded runs on the same ref.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.10"
  RUFF_VERSION: "0.15.7"
  BANDIT_VERSION: "1.7.10"
  PIP_AUDIT_VERSION: "2.7.3"
  PYTEST_COV_VERSION: "5.0.0"

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff (lint + format check)
  # ---------------------------------------------------------------------------
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install "ruff==${{ env.RUFF_VERSION }}"

      # clients/python (SDK) and eval/ (RAGAS harness) are linted with the same
      # repo-root ruff config as the services — both omit a [tool.ruff] section
      # so ruff walks up to the root pyproject. Folded into this one fast job.
      - name: ruff check
        run: ruff check services/qna services/ingestion clients/python eval

      - name: ruff format --check
        run: ruff format --check services/qna services/ingestion clients/python eval

  # ---------------------------------------------------------------------------
  # Security — bandit + pip-audit
  # ---------------------------------------------------------------------------
  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install "bandit==${{ env.BANDIT_VERSION }}" "pip-audit==${{ env.PIP_AUDIT_VERSION }}"

      # bandit static analysis. `-r` recursive; skip the test directories
      # (those are allowed to use `# nosec` patterns like hardcoded test
      # tokens, MD5 in fixtures, etc.). Config in pyproject.toml `[tool.bandit]`.
      - name: bandit (Python AST security scan)
        run: bandit -r services/qna services/ingestion -x '*/test/*'

      # pip-audit checks INSTALLED packages against the GitHub Advisory
      # Database, per service so a CVE in one dep set doesn't mask the other.
      #
      # REPORT-ONLY this round (continue-on-error: true). The baseline carries
      # a backlog of known CVEs in pinned deps (starlette, aiohttp,
      # python-multipart, ...) whose fixes need major version bumps that must
      # be validated against FastAPI/Starlette compatibility in a dedicated PR
      # — not bundled into the gate-introduction change. Mirrors the coverage
      # "computed, not gated this round" stance above. The report still prints
      # in the job log; flip back to a hard gate once the bumps land.
      - name: pip-audit (QnA dependencies)
        run: pip-audit --requirement services/qna/requirements.txt
        continue-on-error: true

      - name: pip-audit (ingestion dependencies)
        # libgl1 / libglib2.0-0 not needed here — pip-audit only inspects the
        # requirements file, doesn't import the packages.
        # Report-only this round — see the QnA step above for rationale.
        run: pip-audit --requirement services/ingestion/requirements.txt
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Bicep — validate IaC template compiles
  # ---------------------------------------------------------------------------
  bicep:
    name: bicep build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # az CLI is preinstalled on ubuntu-latest. Ensure bicep is current
      # (preinstalled bicep can lag); this is fast and avoids cryptic
      # "BCP000" version-mismatch errors during build.
      - name: Upgrade az bicep
        run: az bicep upgrade || az bicep install

      # Verifies the template parses and compiles to ARM JSON. Does NOT
      # deploy. Output goes to /tmp so the workspace stays clean.
      - name: az bicep build
        run: az bicep build --file infra/main.bicep --outfile /tmp/main.json

  # ---------------------------------------------------------------------------
  # Shell — shellcheck on any *.sh in scripts/
  # ---------------------------------------------------------------------------
  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # shellcheck is preinstalled on ubuntu-latest. Use `find -print0` +
      # `xargs -0` so paths with spaces are safe. The check is conditional
      # so this job passes when the scripts/ directory doesn't exist yet
      # (e.g., before PR #14 merges) without a separate "no files" branch.
      - name: ShellCheck (scripts/*.sh)
        run: |
          if [ -d scripts ]; then
            find scripts -type f -name '*.sh' -print0 \
              | xargs -0 --no-run-if-empty shellcheck --severity=warning
          else
            echo "scripts/ directory does not exist; nothing to lint."
          fi

  # ---------------------------------------------------------------------------
  # Test — pytest with coverage (matrix over services)
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        service: [qna, ingestion]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/${{ matrix.service }}/requirements-dev.txt

      # PyMuPDF + langchain image pipeline drag in libs that need system
      # packages. Only the ingestion leg needs them.
      - name: Install ingestion system deps
        if: matrix.service == 'ingestion'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install service requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/${{ matrix.service }}/requirements.txt
          if [ -f services/${{ matrix.service }}/requirements-dev.txt ]; then
            python -m pip install -r services/${{ matrix.service }}/requirements-dev.txt
          fi
          python -m pip install pytest pytest-asyncio "pytest-cov==${{ env.PYTEST_COV_VERSION }}"

      # Coverage report emitted to coverage.xml (Cobertura format — broadly
      # supported by GitHub annotations and external tools). No
      # `--cov-fail-under` gate this PR; threshold lands in a follow-up
      # after the baseline is observable from the artifact.
      - name: Run pytest with coverage
        working-directory: services/${{ matrix.service }}
        run: |
          pytest -q -ra \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/coverage.xml
            services/${{ matrix.service }}/htmlcov/
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Test (SDK) — clients/python typed HTTP client
  # ---------------------------------------------------------------------------
  #
  # The SDK deps are light (httpx + pydantic) and its tests mock all HTTP with
  # httpx.MockTransport, so this runs fast on the standard runner with no system
  # packages. Kept out of the {qna, ingestion} matrix because it installs an
  # editable package rather than a service requirements file. Gates on lint like
  # the service tests do.
  test-sdk:
    name: test (sdk)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: clients/python/pyproject.toml

      # The `[dev]` extra adds pytest; the base deps pull httpx + pydantic.
      - name: Install SDK (with dev extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "clients/python[dev]"

      - name: Run pytest
        working-directory: clients/python
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Test (eval) — eval/ RAGAS offline evaluation harness
  # ---------------------------------------------------------------------------
  #
  # SEPARATE job, deliberately NOT in the {qna, ingestion} matrix and NOT a
  # `needs:` of any other job, so its heavy install (eval/requirements.txt pulls
  # ragas + datasets + the full QnA runtime via `-r ../services/qna/...`, several
  # minutes) runs in PARALLEL and never sits on the fast critical path.
  #
  # Runs on every push AND every PR (the workflow's two triggers): per-PR
  # coverage is preferred and this job blocks nothing, so the extra parallel
  # minutes are cheap insurance against the SDK/eval hole this PR is closing.
  # It is a REAL gate — a failing eval test fails the run (no continue-on-error;
  # that is reserved for the report-only pip-audit steps).
  #
  # eval pulls only the QnA dep set, which (like the qna test leg) needs no
  # libgl/libglib system packages — so no apt step here.
  test-eval:
    name: test (eval)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: eval/requirements.txt

      - name: Install eval harness requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r eval/requirements.txt
          python -m pip install pytest pytest-asyncio

      # Run from the repo root so eval/tests/conftest.py is discovered and sets
      # the fake Azure env BEFORE the harness (which validates Azure config at
      # import time) is collected. Mocked end to end — no live Azure or RAGAS LLM
      # call.
      - name: Run pytest
        run: pytest eval -q
