# Dependabot keeps TocDoc's dependencies current and surfaces CVE fixes as PRs
# that CodeRabbit + the architect review — taking the per-bump dependency churn
# off the implementation loop.
#
# Noise control:
#   - weekly cadence, bounded open-PR counts.
#   - minor/patch updates are GROUPED into one PR per surface.
#   - the fragile ecosystems (langchain*, the FastAPI/Starlette stack, azure-*)
#     are grouped so the whole family moves together — that mirrors how they
#     must actually be upgraded (e.g. fastapi pins starlette; the langchain
#     packages are version-locked to each other). Reviewers gate the risky ones
#     (the deferred LangChain-1.x and pypdf-major cascades will surface here).
version: 2

updates:
  # ---------------------------------------------------------------------------
  # Python — QnA service
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /services/qna
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: ["dependencies", "python", "qna"]
    reviewers: ["MaanavA26"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      langchain:
        patterns: ["langchain*", "langsmith"]
      fastapi-stack:
        patterns: ["fastapi", "starlette", "uvicorn*", "python-multipart", "pydantic*", "httpx*", "httpcore", "anyio"]
      azure:
        patterns: ["azure-*", "msal*"]
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # pydantic_core moves only in lockstep with pydantic (each pydantic
      # release pins its exact pydantic-core); a solo core bump can never
      # resolve against the pinned closure (see closed #186/#187).
      - dependency-name: "pydantic_core"
      # websockets 16 is capped by langgraph-sdk (<16,>=14). Unignore when a
      # langchain-group bump brings a langgraph-sdk that lifts the cap, and
      # move both together (see closed #193/#209).
      - dependency-name: "websockets"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Python — ingestion service (requirements.txt + requirements-dev.txt)
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /services/ingestion
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: ["dependencies", "python", "ingestion"]
    reviewers: ["MaanavA26"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      langchain:
        patterns: ["langchain*", "langsmith"]
      fastapi-stack:
        patterns: ["fastapi", "starlette", "uvicorn*", "python-multipart", "pydantic*", "httpx*", "httpcore", "anyio"]
      azure:
        patterns: ["azure-*", "msal*"]
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # pydantic_core moves only in lockstep with pydantic (see the qna block).
      - dependency-name: "pydantic_core"
      # websockets 16 capped by langgraph-sdk <16 (see the qna block).
      - dependency-name: "websockets"
        update-types: ["version-update:semver-major"]
      # The OpenTelemetry family is exact-pinned by azure-monitor-opentelemetry
      # (1.8.8, the latest as of 2026-06-12, pins instrumentation==0.61b0;
      # instrumentation 0.61b0 requires wrapt<2; opentelemetry-api 1.40 holds
      # importlib_metadata). None of these can move until Microsoft ships a
      # newer azure-monitor-opentelemetry — the azure group will surface that
      # release; unignore these and bump the whole family together then
      # (see closed #194/#195/#196).
      - dependency-name: "wrapt"
      - dependency-name: "opentelemetry-*"
      - dependency-name: "importlib_metadata"

  # ---------------------------------------------------------------------------
  # Python — client SDK (clients/python, pyproject.toml)
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /clients/python
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "sdk"]
    reviewers: ["MaanavA26"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      sdk-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ---------------------------------------------------------------------------
  # Python — RAGAS evaluation harness (eval/)
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /eval
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "eval"]
    reviewers: ["MaanavA26"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      eval-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # eval/ is deliberately held on the ragas-compatible langchain 0.3.x line:
      # ragas 0.4.3 breaks on langchain(-community) 0.4+/1.x (removed
      # ChatVertexAI import — see the rationale header in eval/requirements.txt).
      # langsmith/openai/tiktoken are version-coupled to that line. eval is a
      # CI-only harness (never deployed); the mocked test (eval) gate is the
      # regression backstop. Remove these when ragas supports langchain-core >= 1
      # (third decline of this family: #121–#126, #150–#155, #188–#192).
      - dependency-name: "langchain*"
      - dependency-name: "langgraph*"
      - dependency-name: "langsmith"
      - dependency-name: "openai"
      - dependency-name: "tiktoken"
      - dependency-name: "ragas"
      # pydantic_core moves only in lockstep with pydantic (see the service
      # blocks); a solo core bump poisons the whole eval-minor-patch group
      # (closed #204/#213).
      - dependency-name: "pydantic_core"

  # ---------------------------------------------------------------------------
  # GitHub Actions — CI workflow pins
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    reviewers: ["MaanavA26"]
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]

  # ---------------------------------------------------------------------------
  # Docker — service base images
  # ---------------------------------------------------------------------------
  - package-ecosystem: docker
    directory: /services/qna
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "docker", "qna"]
    reviewers: ["MaanavA26"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /services/ingestion
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "docker", "ingestion"]
    reviewers: ["MaanavA26"]
    commit-message:
      prefix: "chore(deps)"
