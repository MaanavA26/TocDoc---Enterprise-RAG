[pytest]
# Hermetic end-to-end integration suite. Run with:
#   pytest tests/integration -q
#
# `pythonpath = .` puts this directory on sys.path so the test modules can do
# `from conftest import ...` for the shared helpers. The service directories
# themselves are placed on sys.path by conftest at app-load time.
pythonpath = .
addopts = -ra
