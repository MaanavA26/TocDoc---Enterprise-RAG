# Soak profile — hold a steady, moderate load for a long stretch to surface
# slow leaks, connection-pool exhaustion, index throttling, and latency drift
# that a short run hides. Keep concurrency below the ramp's knee.
#
# Usage:
#   locust --config loadtest/scenarios/soak.conf --host "$TOCDOC_BASE_URL"

locustfile = loadtest/locustfile.py
headless = true
users = 20
spawn-rate = 1
run-time = 2h
csv = loadtest/results/soak
csv-full-history = true
exit-code-on-error = 1
