# Ramp profile — gradually climb to a moderate concurrency to find the latency
# knee and the sustainable RPS. Spawn-rate is deliberately gentle so you can
# watch p95/p99 rise with load in the web UI or CSV history.
#
# Usage:
#   locust --config loadtest/scenarios/ramp.conf --host "$TOCDOC_BASE_URL"

locustfile = loadtest/locustfile.py
headless = true
users = 50
spawn-rate = 2
run-time = 10m
# Emit per-interval CSV history so you can chart RPS/p95 over the ramp.
csv = loadtest/results/ramp
csv-full-history = true
exit-code-on-error = 1
