# Smoke profile — a tiny, short headless run to confirm the target is reachable
# and the auth/wire contract is correct before any heavier load.
#
# Usage:
#   locust --config loadtest/scenarios/smoke.conf --host "$TOCDOC_BASE_URL"
#
# (Credentials come from the environment — see loadtest/README.md.)

locustfile = loadtest/locustfile.py
headless = true
users = 5
spawn-rate = 1
run-time = 1m
# Exit code used when any request failed during the run, so a smoke pass against
# a staging deploy returns non-zero on errors — usable as a CI/canary gate.
exit-code-on-error = 1
